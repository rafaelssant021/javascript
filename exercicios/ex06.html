<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>detran</title>
</head>
<body>
    <h1>sistema de multas</h1>
    velocidade do carro: <input type="number" name="txtvel" id="txtvel"> km/h
    <input type="button" value="verificar" onclick="calcular()">
    <div id="ress">

    </div>
    <script>
        function calcular(){
            var txtv = window.document.getElementById('txtvel')
            var ress = window.document.getElementById('ress')
            var vel = Number(txtv.value)
            ress.innerHTML = `<p>sua velocidade atual é de <strong>${vel}km/h</strong></p>`
            if (vel>60) {
                ress.innerHTML += `<p>voce esta <strong>multado</strong> por excesso de velocidade</p>`
            }
            ress.innerHTML += `<p>dirija sempre com cinto de segurança</p>`
        }
    </script>
</body>
</html>
